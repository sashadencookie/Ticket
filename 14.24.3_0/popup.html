<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>NFilL Automator</title>
<link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <strong>NFilL Automator</strong>
  </header>

  <section class="profile">
    <label for="popup-profile">Active profile</label>
    <select id="popup-profile" autofocus></select>
  </section>

  <section class="actions">
    <button id="popup-preview" type="button" aria-pressed="false">Preview matches</button>
    <button id="popup-fill" type="button">Autofill this page</button>
    <button id="popup-manage" type="button">Manage profiles&hellip;</button>
  </section>

  <section class="learn">
    <div class="learn-row">
      <label class="switch">
        <input type="checkbox" id="popup-learn-toggle">
        <span>Auto-Learn</span>
      </label>
      <span id="popup-learn-count" class="pill">0 pending</span>
    </div>
    <button id="popup-learn-save" type="button" disabled>Save learned to profile</button>
  </section>

  <footer>
    <span id="popup-status"></span>
  </footer>

  <script src="js/popup.js"></script>
</body>
</html>
